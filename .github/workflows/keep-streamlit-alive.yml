name: Streamlit Keep-Alive

on:
  schedule:
    # Runs every 8 hours (Streamlit sleeps after 12 hours of inactivity)
    - cron: "0 */8 * * *"
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

env:
  # Silences the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Streamlit App
        # Replace the URL below with your actual Streamlit public URL
        run: |
          curl -sSf https://your-app-name.streamlit.app > /dev/null
          echo "Successfully pinged the dashboard!"
